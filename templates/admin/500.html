<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 - Server Error | Blueprint Admin</title>
  <link rel="icon" type="image/svg+xml" href="/static/admin-favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .error-card {
      background: white;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .error-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .error-icon i {
      font-size: 2rem;
      color: #dc2626;
    }

    .error-code {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.75rem;
    }

    .error-message {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      margin-left: 0.75rem;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider-text {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .help-text {
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .help-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .help-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .error-card {
        padding: 2rem 1.5rem;
      }

      .error-code {
        font-size: 3rem;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      .btn-secondary {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-card">
      <div class="error-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>

      <div class="error-code">500</div>
      <h1 class="error-title">Server Error</h1>
      <p class="error-message">
        Something went wrong on our end. We've been notified and are working to fix it.
      </p>

      <div class="buttons">
        <a href="/bp-manage/" class="btn btn-primary">
          <i class="fa-solid fa-house"></i>
          Admin Home
        </a>
        <button onclick="window.location.reload()" class="btn btn-secondary">
          <i class="fa-solid fa-rotate-right"></i>
          Try Again
        </button>
      </div>

      <div class="divider">
        <span></span>
        <p class="divider-text">or</p>
        <span></span>
      </div>

      <p class="help-text">
        If this keeps happening, <a href="/bp-manage/bug-reports/">report a bug</a>
      </p>
    </div>
  </div>
</body>
</html>
