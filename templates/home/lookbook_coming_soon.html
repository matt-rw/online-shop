{% extends "base.html" %}

{% block title %}Lookbook - Blueprint Apparel{% endblock %}

{% block content %}
<section style="background: #000; min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  <div style="text-align: center;">
    <p style="font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin: 0 0 2rem;">Lookbook</p>
    <h1 style="font-family: 'Inter', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: #fff; letter-spacing: -0.03em; margin: 0 0 1rem;">Coming Soon</h1>
    <p style="font-size: 0.95rem; color: rgba(255,255,255,0.35); margin: 0 0 2.5rem;">Check back soon.</p>
    <a href="{% url 'shop:shop' %}" style="font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; text-decoration: none; padding: 12px 32px; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s;" onmouseenter="this.style.background='#fff'; this.style.color='#000'" onmouseleave="this.style.background='transparent'; this.style.color='#fff'">Shop Collection</a>
  </div>
</section>
{% endblock %}
