{% if available_currencies|length > 1 %}
<div id="currency-selector" style="position: relative; z-index: 100;">
  <button id="currency-toggle" type="button" aria-label="Select currency"
          style="display: flex; align-items: center; gap: 0.25rem; padding: 0.4rem 0.5rem; border: none; background: none; cursor: pointer; transition: opacity 0.2s; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; color: #fff;"
          onmouseenter="this.style.opacity='0.6'" onmouseleave="this.style.opacity='1'">
    <span id="current-currency-code">{{ current_currency.code }}</span>
    <svg style="width: 10px; height: 10px; margin-left: 1px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
    </svg>
  </button>

  <div id="currency-menu" class="hidden" style="position: absolute; right: 0; top: 100%; margin-top: 0; min-width: 100px; background: #000; border: 1px solid rgba(255,255,255,0.08); border-top: none; z-index: 9999;">
    {% for currency in available_currencies %}
    <button type="button"
            class="currency-option"
            data-code="{{ currency.code }}"
            style="display: block; width: 100%; text-align: left; padding: 0.625rem 1rem; border: none; background: {% if currency.code == current_currency.code %}rgba(255,255,255,0.05){% else %}none{% endif %}; cursor: pointer; transition: background 0.15s; font-family: 'Inter', sans-serif; font-size: 0.7rem; color: rgba(255,255,255,0.5);"
            onmouseenter="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';"
            onmouseleave="this.style.background='{% if currency.code == current_currency.code %}rgba(255,255,255,0.05){% else %}transparent{% endif %}'; this.style.color='rgba(255,255,255,0.5)';">
      {{ currency.symbol }} {{ currency.code }}
    </button>
    {% endfor %}
  </div>
</div>

<script>
(function() {
  var toggle = document.getElementById('currency-toggle');
  var menu = document.getElementById('currency-menu');
  var selector = document.getElementById('currency-selector');
  if (!toggle || !menu || !selector) return;

  var timeout;

  function getCookie(name) {
    var cookies = document.cookie.split(';');
    for (var i = 0; i < cookies.length; i++) {
      var c = cookies[i].trim();
      if (c.substring(0, name.length + 1) === (name + '='))
        return decodeURIComponent(c.substring(name.length + 1));
    }
    return null;
  }

  selector.addEventListener('mouseenter', function() { clearTimeout(timeout); menu.classList.remove('hidden'); });
  selector.addEventListener('mouseleave', function() { timeout = setTimeout(function() { menu.classList.add('hidden'); }, 150); });
  menu.addEventListener('mouseenter', function() { clearTimeout(timeout); });
  menu.addEventListener('mouseleave', function() { timeout = setTimeout(function() { menu.classList.add('hidden'); }, 150); });

  toggle.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); menu.classList.toggle('hidden'); });

  menu.addEventListener('click', function(e) {
    var btn = e.target.closest('.currency-option');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    var code = btn.dataset.code;
    if (!code) return;
    btn.style.opacity = '0.5';
    fetch('{% url "shop:set_currency" %}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ currency_code: code }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.success) window.location.reload(); else btn.style.opacity = '1'; })
    .catch(function() { btn.style.opacity = '1'; });
  });

  document.addEventListener('click', function(e) { if (!selector.contains(e.target)) menu.classList.add('hidden'); });
})();
</script>
{% endif %}
