{% load static %}

<footer style="background: #000; color: #fff;">
  <div style="max-width: 80rem; margin: 0 auto; padding: 5rem 2rem 3rem;">

    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 3rem;">

      <!-- Left: brand -->
      <div>
        <a href="{% url 'home' %}" style="text-decoration: none;">
          <span style="font-family: 'Inter', sans-serif; font-size: clamp(2rem, 3vw, 3rem); font-weight: 800; letter-spacing: -0.03em; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: geometricPrecision;">Blueprint</span>
        </a>
      </div>

      <!-- Right: links stacked -->
      <div style="display: flex; flex-direction: column; gap: 0.625rem; padding-top: 0.5rem;">
        <a href="{% url 'shop:shop' %}" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">Shop</a>
        <a href="{% url 'shop:about' %}" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">About</a>
        <a href="{% url 'shop:lookbook' %}" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">Lookbook</a>
        <a href="{% url 'shop:contact' %}" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.15s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">Contact</a>

    </div>
