{% load static %}
{% load currency_tags %}

<nav style="background: #000; border-bottom: 1px solid rgba(255,255,255,0.08);">
  <div style="max-width: 80rem; margin: 0 auto; padding: 0 2rem;">
    <div style="display: flex; align-items: center; justify-content: space-between; height: 56px; position: relative;">

      <!-- Left - Menu -->
      <div id="menu-trigger" style="display: flex; align-items: center;">
        <button id="menu-toggle" type="button" style="padding: 0.5rem; margin-left: -0.5rem; border: none; background: none; cursor: pointer; transition: opacity 0.2s;" aria-label="Menu" onmouseenter="this.style.opacity='0.6'" onmouseleave="this.style.opacity='1'">
          <svg style="width: 22px; height: 22px; color: #fff;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7h16M4 17h16"></path>
          </svg>
        </button>
      </div>

      <!-- Center - Brand -->
      <div style="position: absolute; left: 50%; transform: translateX(-50%);">
        <a href="{% url 'home' %}" style="text-decoration: none; transition: opacity 0.2s;" onmouseenter="this.style.opacity='0.6'" onmouseleave="this.style.opacity='1'">
          <span style="font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: #fff;">Blueprint</span>
        </a>
      </div>

      <!-- Right - Icons -->
      <div style="display: flex; align-items: center; gap: 0.25rem;">
        <div class="text-white">
          {% currency_selector %}
        </div>
        <div id="account-trigger" style="position: relative;">
          <button id="account-toggle" type="button" style="padding: 0.5rem; border: none; background: none; cursor: pointer; transition: opacity 0.2s;" aria-label="Account" onmouseenter="this.style.opacity='0.6'" onmouseleave="this.style.opacity='1'">
            <svg style="width: 20px; height: 20px; color: #fff;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path>
            </svg>
          </button>
          <!-- Account Dropdown -->
          <div id="account-menu" class="hidden" style="position: absolute; right: 0; top: 100%; margin-top: 0; min-width: 200px; background: #000; border: 1px solid rgba(255,255,255,0.08); border-top: none; z-index: 50;">
            {% if user.is_authenticated %}
            <a href="{% url 'shop:account' %}" style="display: block; padding: 1rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.5)'">Account</a>
            <a href="{% url 'shop:orders' %}" style="display: block; padding: 1rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.5)'">Orders</a>
            <a href="{% url 'account_logout' %}" style="display: block; padding: 1rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.5)'">Logout</a>
            {% else %}
            <button onclick="openLoginModal(); closeAccountMenu();" style="display: block; width: 100%; text-align: left; padding: 1rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.5)'">Sign In</button>
            <a href="{% url 'account_signup' %}" style="display: block; padding: 1rem 1.5rem; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.5)'">Create Account</a>
            {% endif %}
          </div>
        </div>
        <a href="{% url 'shop:cart' %}" style="padding: 0.5rem; margin-right: -0.5rem; text-decoration: none; transition: opacity 0.2s;" aria-label="Cart" onmouseenter="this.style.opacity='0.6'" onmouseleave="this.style.opacity='1'">
          <svg style="width: 20px; height: 20px; color: #fff;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
        </a>
      </div>

    </div>
  </div>

  <!-- Main Menu Dropdown -->
  <div id="nav-menu" class="hidden" style="background: #000; border-top: 1px solid rgba(255,255,255,0.06);">
    <div style="max-width: 80rem; margin: 0 auto; padding: 2.5rem 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0;" class="md:grid-cols-2">

      <!-- Left column — primary nav -->
      <div style="padding-right: 3rem; border-right: 1px solid rgba(255,255,255,0.06);">
        <p style="font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin: 0 0 1.5rem;">Navigate</p>
        <div style="display: flex; flex-direction: column; gap: 0;">
          <a href="{% url 'shop:shop' %}" style="display: block; padding: 0.75rem 0; font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.04); transition: opacity 0.2s;" onmouseenter="this.style.opacity='0.5'" onmouseleave="this.style.opacity='1'">Shop</a>
          <a href="{% url 'shop:shop' %}?category=tops" style="display: block; padding: 0.75rem 0; font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.04); transition: opacity 0.2s;" onmouseenter="this.style.opacity='0.5'" onmouseleave="this.style.opacity='1'">Tops</a>
          <a href="{% url 'shop:shop' %}?category=bottoms" style="display: block; padding: 0.75rem 0; font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.04); transition: opacity 0.2s;" onmouseenter="this.style.opacity='0.5'" onmouseleave="this.style.opacity='1'">Bottoms</a>
        </div>
      </div>

      <!-- Right column — secondary -->
      <div style="padding-left: 3rem;">
        <p style="font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin: 0 0 1.5rem;">More</p>
        <div style="display: flex; flex-direction: column; gap: 0;">
          <a href="{% url 'shop:lookbook' %}" style="display: block; padding: 0.625rem 0; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">Lookbook</a>
          <a href="{% url 'shop:about' %}" style="display: block; padding: 0.625rem 0; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">About</a>
          <a href="{% url 'shop:contact' %}" style="display: block; padding: 0.625rem 0; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;" onmouseenter="this.style.color='#fff'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">Contact</a>
        </div>
      </div>

    </div>
  </div>

</nav>

<script>
(function() {
  var menuTrigger = document.getElementById('menu-trigger');
  var menuToggle = document.getElementById('menu-toggle');
  var navMenu = document.getElementById('nav-menu');
  var accountTrigger = document.getElementById('account-trigger');
  var accountToggle = document.getElementById('account-toggle');
  var accountMenu = document.getElementById('account-menu');

  var menuTimeout, accountTimeout;
  var navEl = document.querySelector('nav');

  // Open menu on hamburger hover
  menuTrigger.addEventListener('mouseenter', function() {
    clearTimeout(menuTimeout);
    navMenu.classList.remove('hidden');
    accountMenu.classList.add('hidden');
  });

  // Keep menu open while anywhere inside nav or the dropdown
  navEl.addEventListener('mouseenter', function() { clearTimeout(menuTimeout); });
  navMenu.addEventListener('mouseenter', function() { clearTimeout(menuTimeout); });

  // Only close when mouse leaves the entire nav (including dropdown)
  navEl.addEventListener('mouseleave', function() {
    menuTimeout = setTimeout(function() { navMenu.classList.add('hidden'); }, 80);
  });

  accountTrigger.addEventListener('mouseenter', function() {
    clearTimeout(accountTimeout);
    accountMenu.classList.remove('hidden');
    navMenu.classList.add('hidden');
  });
  accountTrigger.addEventListener('mouseleave', function() {
    accountTimeout = setTimeout(function() { accountMenu.classList.add('hidden'); }, 200);
  });
  accountMenu.addEventListener('mouseenter', function() { clearTimeout(accountTimeout); });
  accountMenu.addEventListener('mouseleave', function() {
    accountTimeout = setTimeout(function() { accountMenu.classList.add('hidden'); }, 200);
  });

  menuToggle.addEventListener('click', function() {
    navMenu.classList.toggle('hidden');
    accountMenu.classList.add('hidden');
  });
  accountToggle.addEventListener('click', function() {
    accountMenu.classList.toggle('hidden');
    navMenu.classList.add('hidden');
  });

  document.addEventListener('click', function(e) {
    if (!menuTrigger.contains(e.target) && !navMenu.contains(e.target)) navMenu.classList.add('hidden');
    if (!accountTrigger.contains(e.target) && !accountMenu.contains(e.target)) accountMenu.classList.add('hidden');
  });

  window.closeAccountMenu = function() { accountMenu.classList.add('hidden'); };
})();
</script>
