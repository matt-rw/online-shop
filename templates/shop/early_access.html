{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Early Access - Blueprint Apparel</title>
  <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      margin-bottom: 2.5rem;
    }

    .logo img {
      height: 48px;
      width: auto;
      filter: invert(1);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: #888;
      font-size: 0.9375rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #333;
      border-radius: 8px;
      background: #111;
      color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
      letter-spacing: 0.1em;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }

    input::placeholder {
      color: #555;
      letter-spacing: 0.05em;
    }

    button {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: #000;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
    }

    button:active {
      transform: translateY(0);
    }

    .error {
      background: #2d1515;
      border: 1px solid #5c2828;
      color: #ff6b6b;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }

    .footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8125rem;
    }

    .footer a {
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-text">Blueprint</div>
    </div>

    <h1>Early Access</h1>
    <p class="subtitle">Enter your access code to preview the site before launch.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <input type="text" name="code" placeholder="Enter code" autocomplete="off" autofocus required>
      </div>
      <button type="submit">Enter</button>
    </form>

    <div class="footer">
      <a href="https://blueprnt.store">blueprnt.store</a>
    </div>
  </div>
</body>
</html>
